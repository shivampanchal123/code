<!DOCTYPE html>
<html>
<head>
    <title>Myntra Clone</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            margin:0;
        }

        h1{
            color:#ff3f6c;
            text-align:center;
        }

        .search-box{
            text-align:center;
            margin:20px;
        }

        #search{
            width:350px;
            padding:12px;
            border-radius:20px;
            border:1px solid gray;
        }

        .container{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
        }

        .product{
            background:white;
            width:220px;
            margin:15px;
            padding:15px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 0 10px lightgray;
        }

        .product img{
            width:180px;
            height:200px;
            border-radius:10px;
        }

        button{
            background:#ff3f6c;
            color:white;
            border:none;
            padding:10px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:red;
        }

        #cart{
            width:500px;
            margin:30px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        li{
            margin:10px 0;
        }
    </style>
</head>
<body>

<h1>Myntra Clone</h1>

<div class="search-box">
    <input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
</div>

<div class="container">

    <div class="product">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400" alt="">
        <h3>T-Shirt</h3>
        <p>₹500</p>
        <button onclick="addToCart('T-Shirt',500)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=400" alt="">
        <h3>Jeans</h3>
        <p>₹1200</p>
        <button onclick="addToCart('Jeans',1200)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" alt="">
        <h3>Shoes</h3>
        <p>₹2000</p>
        <button onclick="addToCart('Shoes',2000)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" alt="">
        <h3>Watch</h3>
        <p>₹1500</p>
        <button onclick="addToCart('Watch',1500)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=400" alt="">
        <h3>Jacket</h3>
        <p>₹1800</p>
        <button onclick="addToCart('Jacket',1800)">Add to Cart</button>
    </div>

</div>

<div id="cart">
    <h2>Shopping Cart</h2>
    <ul id="cartItems"></ul>
    <h3>Total Amount: ₹<span id="total">0</span></h3>
</div>

<script>
let total = 0;

function addToCart(name, price)
{
    let li = document.createElement("li");

    li.innerHTML =
        name + " - ₹" + price +
        ' <button onclick="removeItem(this,' + price + ')">Remove</button>';

    document.getElementById("cartItems").appendChild(li);

    total += price;

    document.getElementById("total").innerHTML = total;
}

function removeItem(button, price)
{
    button.parentElement.remove();

    total -= price;

    document.getElementById("total").innerHTML = total;
}

function searchProduct()
{
    let input = document.getElementById("search").value.toLowerCase();

    let products = document.getElementsByClassName("product");

    for(let i=0;i<products.length;i++)
    {
        let name = products[i]
        .getElementsByTagName("h3")[0]
        .innerHTML.toLowerCase();

        if(name.includes(input))
            products[i].style.display = "block";
        else
            products[i].style.display = "none";
    }
}
</script>

</body>
</html>
